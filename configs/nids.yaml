nids:
  random_forest:
    model_type: "random_forest"
    grid_search:
      n_estimators: [50, 100, 200, 500]
      max_depth: [10, 20, 50]
      min_samples_split: [2, 5, 10]
      min_samples_leaf: [1, 2, 4]
      max_features: ["sqrt", "log2"]
    default:
      n_estimators: 200
      max_depth: 10
      min_samples_split: 2
      min_samples_leaf: 1
      max_features: "sqrt"
      random_state: 42
      n_jobs: -1

  svm:
    model_type: "svm"
    grid_search:
      C: [0.1, 1.0, 10.0, 100.0]
      kernel: ["rbf", "poly", "sigmoid"]
      gamma: ["scale", "auto", 0.001, 0.01, 0.1, 1.0]
      class_weight: ["balanced"]
    default:
      C: 1.0
      kernel: "rbf"
      gamma: "scale"
      class_weight: "balanced"
      random_state: 42
      probability: true
      max_iter: 10000

  dnn:
    model_type: "dnn"
    architecture:
      hidden_dims: [128, 128, 128]
      activation: "relu"
      dropout: 0.2
      batch_norm: true
    grid_search:
      learning_rate: [0.0001, 0.0005, 0.001, 0.005, 0.01]
      batch_size: [64, 128, 256]
      epochs: [50, 100, 200]
      weight_decay: [0.0, 0.0001, 0.001]
      dropout: [0.0, 0.2, 0.5]
    default:
      learning_rate: 0.001
      batch_size: 128
      epochs: 200
      weight_decay: 0.0001
      dropout: 0.2
      early_stopping_patience: 10
      device: "cpu"
