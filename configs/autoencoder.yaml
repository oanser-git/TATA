# Autoencoder configuration
autoencoder:
  # Fixed best config from paper (used as default / anchor in HPO)
  architecture:
    encoder_dims: [64, 32, 16]
    latent_dim: 3
    decoder_dims: [16, 32, 64]
  
  training:
    epochs: 250
    batch_size: 128
    learning_rate: 0.001
    weight_decay: 0.0
  
  contrastive:
    margin: 10.0
    lambda: 0.1
    pair_sampling_strategy: "random"  # or "hard"
    pairs_per_batch: 64  # number of pairs to sample per batch

  # HPO search space (Optuna)
  hpo:
    n_trials: 20
    study_name: "tata_autoencoder_hpo"
    storage: "sqlite:///data/artifacts/optuna.db"
    
    search_space:
      encoder_dims_options:
        - [128, 64, 32]
        - [64, 32, 16]
        - [128, 64, 32, 16]
      latent_dim: [2, 3, 4, 5]
      learning_rate: [1.0e-4, 1.0e-2]  # log uniform
      lambda: [0.01, 1.0]  # log uniform
      margin: [5.0, 20.0]
      batch_size: [64, 128, 256]
      epochs: [100, 300]

  # Clustering
  clustering:
    k_range: [2, 3, 4, 5, 6, 7, 8, 9, 10, 12, 15, 20]
    random_state: 42
    n_init: 10
